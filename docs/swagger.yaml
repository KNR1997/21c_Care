basePath: /
definitions:
  domain.AIResponse:
    properties:
      drugs:
        items:
          $ref: '#/definitions/domain.Drug'
        type: array
      lab_tests:
        items:
          type: string
        type: array
      notes:
        type: string
    type: object
  domain.Drug:
    properties:
      dosage:
        type: string
      duration:
        type: string
      frequency:
        type: string
      name:
        type: string
    type: object
  requests.CreateDrugCatalogRequest:
    properties:
      default_price:
        example: 1200
        type: number
      name:
        example: Dupixent
        type: string
    required:
    - default_price
    - name
    type: object
  requests.CreateLabTestCatalogRequest:
    properties:
      default_price:
        example: 7500
        type: number
      name:
        example: Blood Test
        type: string
    required:
    - default_price
    - name
    type: object
  requests.CreatePatientRequest:
    properties:
      age:
        example: 34
        type: integer
      gender:
        example: Male
        type: string
      name:
        example: Saman Perera
        type: string
    required:
    - age
    - gender
    - name
    type: object
  requests.CreatePostRequest:
    properties:
      content:
        example: Echo is nice!
        type: string
      title:
        example: Echo
        type: string
    required:
    - content
    - title
    type: object
  requests.CreateVisitRequest:
    properties:
      ai_result:
        $ref: '#/definitions/domain.AIResponse'
      patient_id:
        example: 1
        type: integer
      raw_input:
        example: Patient has fever for 3 days. Prescribe Paracetamol 500mg twice daily.
          Order CBC test.
        type: string
    required:
    - ai_result
    - patient_id
    - raw_input
    type: object
  requests.LoginRequest:
    properties:
      email:
        example: john.doe@example.com
        type: string
      password:
        example: "11111111"
        type: string
    required:
    - email
    - password
    type: object
  requests.OAuthRequest:
    properties:
      token:
        type: string
    required:
    - token
    type: object
  requests.PreviewVisitRequest:
    properties:
      raw_input:
        example: Patient has fever for 3 days. Prescribe Paracetamol 500mg twice daily.
          Order CBC test.
        type: string
    required:
    - raw_input
    type: object
  requests.RefreshRequest:
    properties:
      token:
        example: refresh_token
        type: string
    required:
    - token
    type: object
  requests.RegisterRequest:
    properties:
      email:
        example: john.doe@example.com
        type: string
      name:
        example: John Doe
        type: string
      password:
        example: "11111111"
        type: string
    required:
    - email
    - name
    - password
    type: object
  requests.UpdateDrugCatalogRequest:
    properties:
      default_price:
        example: 1200
        type: number
      name:
        example: Dupixent
        type: string
    required:
    - default_price
    - name
    type: object
  requests.UpdateLabTestCatalogRequest:
    properties:
      default_price:
        example: 7500
        type: number
      name:
        example: Blood Test
        type: string
    required:
    - default_price
    - name
    type: object
  requests.UpdatePatientRequest:
    properties:
      age:
        example: 34
        type: integer
      gender:
        example: Male
        type: string
      name:
        example: Saman Perera
        type: string
    required:
    - age
    - gender
    - name
    type: object
  requests.UpdatePostRequest:
    properties:
      content:
        example: Echo is nice!
        type: string
      title:
        example: Echo
        type: string
    required:
    - content
    - title
    type: object
  responses.ClinicalNoteResponse:
    properties:
      id:
        type: integer
      note:
        example: some notes
        type: string
      visit_id:
        example: 1
        type: integer
    type: object
  responses.Data:
    properties:
      code:
        type: integer
      message:
        type: string
    type: object
  responses.DrugCatalogPaginationResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/responses.DrugCatalogResponse'
        type: array
      limit:
        example: 10
        type: integer
      page:
        example: 1
        type: integer
      sort:
        example: "1"
        type: string
      total_pages:
        example: 2
        type: integer
      total_rows:
        example: 8
        type: integer
    type: object
  responses.DrugCatalogResponse:
    properties:
      default_price:
        example: 1200
        type: number
      id:
        example: 1
        type: integer
      name:
        example: Dupixent
        type: string
    type: object
  responses.Error:
    properties:
      code:
        type: integer
      error:
        type: string
    type: object
  responses.LabTestCatalogResponse:
    properties:
      default_price:
        example: 7500
        type: number
      id:
        example: 1
        type: integer
      name:
        example: Blood Test
        type: string
    type: object
  responses.LabTestResponse:
    properties:
      id:
        example: 1
        type: integer
      price:
        example: 7500
        type: number
      test_name:
        example: ECG
        type: string
      visit_id:
        example: 1
        type: integer
    type: object
  responses.LoginResponse:
    properties:
      accessToken:
        type: string
      exp:
        type: integer
      permissions:
        items:
          type: string
        type: array
      refreshToken:
        type: string
      role:
        type: string
    type: object
  responses.PatientPaginationResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/responses.PatientResponse'
        type: array
      limit:
        example: 10
        type: integer
      page:
        example: 1
        type: integer
      sort:
        example: "1"
        type: string
      total_pages:
        example: 2
        type: integer
      total_rows:
        example: 8
        type: integer
    type: object
  responses.PatientResponse:
    properties:
      age:
        example: 34
        type: integer
      gender:
        example: Male
        type: string
      id:
        type: integer
      name:
        example: Saman Perera
        type: string
    type: object
  responses.PostResponse:
    properties:
      content:
        example: Echo is nice!
        type: string
      id:
        example: 1
        type: integer
      title:
        example: Echo
        type: string
      username:
        example: John Doe
        type: string
    type: object
  responses.PrescribedDrugResponse:
    properties:
      dosage:
        example: "7500"
        type: string
      drug_name:
        example: ECG
        type: string
      duration:
        example: 5 days
        type: string
      frequency:
        example: Once a day
        type: string
      id:
        example: 1
        type: integer
      price:
        example: 7500
        type: number
      visit_id:
        example: 1
        type: integer
    type: object
  responses.VisitPaginationResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/responses.VisitResponse'
        type: array
      limit:
        example: 10
        type: integer
      page:
        example: 1
        type: integer
      sort:
        example: "1"
        type: string
      total_pages:
        example: 2
        type: integer
      total_rows:
        example: 8
        type: integer
    type: object
  responses.VisitResponse:
    properties:
      clinical_notes:
        items:
          $ref: '#/definitions/responses.ClinicalNoteResponse'
        type: array
      id:
        example: 1
        type: integer
      lab_tests:
        items:
          $ref: '#/definitions/responses.LabTestResponse'
        type: array
      patient:
        $ref: '#/definitions/responses.PatientResponse'
      patient_id:
        example: 1
        type: integer
      prescribed_drugs:
        items:
          $ref: '#/definitions/responses.PrescribedDrugResponse'
        type: array
      raw_input:
        example: Echo
        type: string
    type: object
