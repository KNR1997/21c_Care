basePath: /
definitions:
  requests.CreateDrugCatalogRequest:
    properties:
      default_price:
        example: 34
        type: number
      name:
        example: Saman Perera
        type: string
    required:
    - default_price
    - name
    type: object
  requests.CreatePatientRequest:
    properties:
      age:
        example: 34
        type: integer
      gender:
        example: Male
        type: string
      name:
        example: Saman Perera
        type: string
    required:
    - age
    - gender
    - name
    type: object
  requests.CreatePostRequest:
    properties:
      content:
        example: Echo is nice!
        type: string
      title:
        example: Echo
        type: string
    required:
    - content
    - title
    type: object
  requests.LoginRequest:
    properties:
      email:
        example: john.doe@example.com
        type: string
      password:
        example: "11111111"
        type: string
    required:
    - email
    - password
    type: object
  requests.OAuthRequest:
    properties:
      token:
        type: string
    required:
    - token
    type: object
  requests.RefreshRequest:
    properties:
      token:
        example: refresh_token
        type: string
    required:
    - token
    type: object
  requests.RegisterRequest:
    properties:
      email:
        example: john.doe@example.com
        type: string
      name:
        example: John Doe
        type: string
      password:
        example: "11111111"
        type: string
    required:
    - email
    - name
    - password
    type: object
  requests.UpdateDrugCatalogRequest:
    properties:
      default_price:
        example: 34
        type: number
      name:
        example: Saman Perera
        type: string
    required:
    - default_price
    - name
    type: object
  requests.UpdatePatientRequest:
    properties:
      age:
        example: 34
        type: integer
      gender:
        example: Male
        type: string
      name:
        example: Saman Perera
        type: string
    required:
    - age
    - gender
    - name
    type: object
  requests.UpdatePostRequest:
    properties:
      content:
        example: Echo is nice!
        type: string
      title:
        example: Echo
        type: string
    required:
    - content
    - title
    type: object
  responses.Data:
    properties:
      code:
        type: integer
      message:
        type: string
    type: object
  responses.DrugCatalogResponse:
    properties:
      default_price:
        example: 34
        type: number
      name:
        example: Saman Perera
        type: string
    type: object
  responses.Error:
    properties:
      code:
        type: integer
      error:
        type: string
    type: object
  responses.LoginResponse:
    properties:
      accessToken:
        type: string
      exp:
        type: integer
      refreshToken:
        type: string
    type: object
  responses.PatientResponse:
    properties:
      age:
        example: 34
        type: integer
      gender:
        example: Male
        type: string
      name:
        example: Saman Perera
        type: string
    type: object
  responses.PostResponse:
    properties:
      content:
        example: Echo is nice!
        type: string
      id:
        example: 1
        type: integer
      title:
        example: Echo
        type: string
      username:
        example: John Doe
        type: string
    type: object
info:
  contact:
    email: kethakaranasinghe@gmail.com
    name: KNR Solutions
  description: This is a demo version of Echo app.
  title: Echo Demo App
  version: "1.0"
paths:
  /drugcatalogs:
    get:
      description: Get the list of all drugcatalogs
      operationId: drugcatalogs-get
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/responses.DrugCatalogResponse'
            type: array
      security:
      - ApiKeyAuth: []
      summary: Get drugcatalogs
      tags:
      - DrugCatalogs Actions
    post:
      consumes:
      - application/json
      description: Create drugcatalog
      operationId: drugcatalogs-create
      parameters:
      - description: DrugCatalog name and age
        in: body
        name: params
        required: true
        schema:
          $ref: '#/definitions/requests.CreateDrugCatalogRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/responses.Data'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.Error'
      security:
      - ApiKeyAuth: []
      summary: Create drugcatalog
      tags:
      - DrugCatalogs Actions
  /drugcatalogs/{id}:
    delete:
      description: Delete drugcatalog
      operationId: drugcatalogs-delete
      parameters:
      - description: DrugCatalog ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
          schema:
            $ref: '#/definitions/responses.Data'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/responses.Error'
      security:
      - ApiKeyAuth: []
      summary: Delete drugcatalog
      tags:
      - DrugCatalogs Actions
    put:
      consumes:
      - application/json
      description: Update drugcatalog
      operationId: drugcatalogs-update
      parameters:
      - description: DrugCatalog ID
        in: path
        name: id
        required: true
        type: integer
      - description: DrugCatalog name and age
        in: body
        name: params
        required: true
        schema:
          $ref: '#/definitions/requests.UpdateDrugCatalogRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/responses.Data'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/responses.Error'
      security:
      - ApiKeyAuth: []
      summary: Update drugcatalog
      tags:
      - DrugCatalogs Actions
  /google-oauth:
    post:
      consumes:
      - application/json
      description: Perform user login using google provider
      operationId: user-auth-google
      parameters:
      - description: Google Token
        in: body
        name: params
        required: true
        schema:
          $ref: '#/definitions/requests.OAuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/responses.LoginResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/responses.Error'
      summary: Authenticate user using google provider
      tags:
      - User Actions
  /login:
    post:
      consumes:
      - application/json
      description: Perform user login
      operationId: user-login
      parameters:
      - description: User's credentials
        in: body
        name: params
        required: true
        schema:
          $ref: '#/definitions/requests.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/responses.LoginResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/responses.Error'
      summary: Authenticate a user
      tags:
      - User Actions
  /patients:
