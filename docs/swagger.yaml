      consumes:
      - application/json
      description: Preview a visit's prompt details by classifying using AI
      operationId: visits-preview
      parameters:
      - description: Visit title and content
        in: body
        name: params
        required: true
        schema:
          $ref: '#/definitions/requests.PreviewVisitRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/responses.VisitResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.Error'
      security:
      - ApiKeyAuth: []
      summary: Classify visit prompt
      tags:
      - Visits Actions
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
